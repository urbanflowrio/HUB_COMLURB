<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>HUB COMLURB — Territorial</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <!-- Cluster -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
            background:#0b1220;
            overflow:hidden;
        }

        #map{
            width:100%;
            height:100vh;
        }

        .topbar{
            position:absolute;
            top:20px;
            left:20px;
            z-index:9999;

            background:rgba(11,18,32,.92);
            backdrop-filter:blur(10px);

            border:1px solid rgba(255,255,255,.08);

            padding:18px;
            border-radius:18px;

            min-width:300px;

            color:#fff;

            box-shadow:0 10px 30px rgba(0,0,0,.35);
        }

        .title{
            font-size:22px;
            font-weight:700;
            margin-bottom:4px;
        }

        .subtitle{
            font-size:13px;
            opacity:.7;
            margin-bottom:18px;
        }

        .filter-group{
            margin-bottom:12px;
        }

        .filter-group label{
            display:block;
            font-size:12px;
            margin-bottom:6px;
            opacity:.7;
        }

        .filter-group input,
        .filter-group select{
            width:100%;
            padding:10px 12px;

            border:none;
            border-radius:10px;

            background:#1a2438;
            color:#fff;

            outline:none;
        }

        .btn{
            width:100%;
            border:none;
            padding:12px;
            border-radius:10px;

            background:#1d4ed8;
            color:#fff;

            cursor:pointer;
            font-weight:600;

            transition:.2s;
        }

        .btn:hover{
            opacity:.9;
        }

        .btn-secondary{
            background:#334155;
            margin-top:10px;
        }

        .stats{
            position:absolute;
            top:20px;
            right:20px;

            z-index:9999;

            display:flex;
            gap:14px;
        }

        .card{
            background:rgba(11,18,32,.92);
            backdrop-filter:blur(10px);

            border:1px solid rgba(255,255,255,.08);

            color:#fff;

            padding:18px;
            border-radius:18px;

            min-width:160px;

            box-shadow:0 10px 30px rgba(0,0,0,.35);
        }

        .card-title{
            font-size:12px;
            opacity:.7;
            margin-bottom:8px;
        }

        .card-value{
            font-size:26px;
            font-weight:700;
        }

        .legend{
            position:absolute;
            bottom:20px;
            left:20px;

            z-index:9999;

            background:rgba(11,18,32,.92);
            backdrop-filter:blur(10px);

            border:1px solid rgba(255,255,255,.08);

            color:#fff;

            padding:16px;
            border-radius:18px;

            box-shadow:0 10px 30px rgba(0,0,0,.35);
        }

        .legend h4{
            margin-bottom:10px;
            font-size:14px;
        }

        .legend-item{
            display:flex;
            align-items:center;
            gap:8px;
            margin-bottom:8px;
            font-size:12px;
        }

        .dot{
            width:14px;
            height:14px;
            border-radius:50%;
        }

        @media(max-width:768px){

            .topbar{
                width:calc(100% - 20px);
                left:10px;
                top:10px;
                min-width:auto;
            }

            .stats{
                top:auto;
                bottom:10px;
                right:10px;
                left:10px;

                flex-direction:column;
            }

            .legend{
                display:none;
            }
        }
    </style>
</head>

<body>

<div id="map"></div>

<!-- CONTROLES -->
<div class="topbar">

    <div class="title">
        HUB COMLURB
    </div>

    <div class="subtitle">
        Inteligência Territorial Operacional
    </div>

    <div class="filter-group">
        <label>Filtrar AP</label>

        <select id="apFilter">
            <option value="all">Todas</option>
            <option value="1">AP 1</option>
            <option value="2">AP 2</option>
            <option value="3">AP 3</option>
            <option value="4">AP 4</option>
            <option value="5">AP 5</option>
        </select>
    </div>

    <div class="filter-group">
        <label>Buscar Bairro</label>

        <input type="text" id="bairroInput" placeholder="Ex: Copacabana">
    </div>

    <div class="filter-group">
        <label>Buscar Logradouro</label>

        <input type="text" id="logradouroInput" placeholder="Ex: Avenida Brasil">
    </div>

    <button class="btn" onclick="aplicarFiltros()">
        Aplicar filtros
    </button>

    <button class="btn btn-secondary" onclick="resetarMapa()">
        Resetar mapa
    </button>

</div>

<!-- CARDS -->
<div class="stats">

    <div class="card">
        <div class="card-title">LOGRADOUROS</div>
        <div class="card-value" id="totalLogradouros">0</div>
    </div>

    <div class="card">
        <div class="card-title">BAIRROS</div>
        <div class="card-value" id="totalBairros">0</div>
    </div>

    <div class="card">
        <div class="card-title">APs</div>
        <div class="card-value" id="totalAPs">0</div>
    </div>

</div>

<!-- LEGENDA -->
<div class="legend">

    <h4>Áreas de Planejamento</h4>

    <div class="legend-item">
        <div class="dot" style="background:#ef4444"></div>
        AP 1
    </div>

    <div class="legend-item">
        <div class="dot" style="background:#3b82f6"></div>
        AP 2
    </div>

    <div class="legend-item">
        <div class="dot" style="background:#10b981"></div>
        AP 3
    </div>

    <div class="legend-item">
        <div class="dot" style="background:#f59e0b"></div>
        AP 4
    </div>

    <div class="legend-item">
        <div class="dot" style="background:#8b5cf6"></div>
        AP 5
    </div>

</div>

<!-- LEAFLET -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- CLUSTER -->
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

const map = L.map('map', {
    zoomControl:true
}).setView([-22.9068, -43.1729], 11);

L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        attribution:'© OpenStreetMap'
    }
).addTo(map);

let geojsonData;
let clusterGroup = L.markerClusterGroup();

function getColor(ap){

    const colors = {
        "1":"#ef4444",
        "2":"#3b82f6",
        "3":"#10b981",
        "4":"#f59e0b",
        "5":"#8b5cf6"
    };

    return colors[ap] || "#94a3b8";
}

fetch('../assets/geojson/logradouros_rj_pontos.geojson')

.then(response => response.json())

.then(data => {

    geojsonData = data;

    carregarMapa(data);

    atualizarCards(data.features);

})

.catch(error => {

    console.error(error);

    alert('Erro ao carregar GeoJSON');

});

function carregarMapa(data){

    clusterGroup.clearLayers();

    const geojsonLayer = L.geoJSON(data, {

        pointToLayer:(feature, latlng)=>{

            return L.circleMarker(latlng, {

                radius:5,

                fillColor:getColor(feature.properties.ap),

                color:"#fff",

                weight:1,

                opacity:1,

                fillOpacity:.85

            });

        },

        onEachFeature:(feature, layer)=>{

            const p = feature.properties;

            layer.bindPopup(`
                <b>${p.nome || 'Sem nome'}</b><br>
                Bairro: ${p.bairro || '-'}<br>
                AP: ${p.ap || '-'}
            `);

        }

    });

    clusterGroup.addLayer(geojsonLayer);

    map.addLayer(clusterGroup);

}

function aplicarFiltros(){

    const ap = document.getElementById('apFilter').value;
    const bairro = document.getElementById('bairroInput').value.toLowerCase();
    const logradouro = document.getElementById('logradouroInput').value.toLowerCase();

    const filtrados = geojsonData.features.filter(f => {

        const p = f.properties;

        const matchAP =
            ap === 'all' ||
            String(p.ap) === ap;

        const matchBairro =
            !bairro ||
            (p.bairro || '').toLowerCase().includes(bairro);

        const matchLogradouro =
            !logradouro ||
            (p.nome || '').toLowerCase().includes(logradouro);

        return matchAP && matchBairro && matchLogradouro;

    });

    carregarMapa({
        type:'FeatureCollection',
        features:filtrados
    });

    atualizarCards(filtrados);

}

function resetarMapa(){

    document.getElementById('apFilter').value = 'all';
    document.getElementById('bairroInput').value = '';
    document.getElementById('logradouroInput').value = '';

    carregarMapa(geojsonData);

    atualizarCards(geojsonData.features);

    map.setView([-22.9068, -43.1729], 11);

}

function atualizarCards(features){

    document.getElementById('totalLogradouros')
        .innerText = features.length.toLocaleString('pt-BR');

    const bairros = new Set(
        features.map(f => f.properties.bairro)
    );

    document.getElementById('totalBairros')
        .innerText = bairros.size;

    const aps = new Set(
        features.map(f => f.properties.ap)
    );

    document.getElementById('totalAPs')
        .innerText = aps.size;

}

</script>

</body>
</html>
