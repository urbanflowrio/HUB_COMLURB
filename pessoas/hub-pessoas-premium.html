<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRE3Q_RdpZOqc4f3O3fQirMQkEXQWyBkiIlXB6LZWgqTZbItGBHAxUHf2-0kEcALDIUfyPeK7GyBQrB/pub?gid=1371643814&single=true&output=csv";

let ROWS = [];
let COL = {};

const $ = id => document.getElementById(id);
const clean = v => (v ?? "").toString().trim();
const norm = v => clean(v).normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," ").toUpperCase();
const fmtInt = n => (+n || 0).toLocaleString("pt-BR");
const fmtPct = n => (+n || 0).toLocaleString("pt-BR",{minimumFractionDigits:1,maximumFractionDigits:1}) + "%";

window.addEventListener("error", e => showError("Erro no painel: " + e.message));

function showError(msg){
  const el = $("status");
  if(el){
    el.style.display = "block";
    el.textContent = msg;
  }
}

function hideError(){
  const el = $("status");
  if(el) el.style.display = "none";
}

async function fetchCsvText(url){
  const directUrl = url + (url.includes("?") ? "&" : "?") + "cachebuster=" + Date.now();

  const attempts = [
    directUrl,
    "https://api.allorigins.win/raw?url=" + encodeURIComponent(directUrl),
    "https://corsproxy.io/?" + encodeURIComponent(directUrl)
  ];

  let lastError = "";

  for(const attempt of attempts){
    try{
      const res = await fetch(attempt,{cache:"no-store"});
      if(!res.ok) throw new Error("HTTP " + res.status);
      const text = await res.text();
      if(text && text.trim().length > 20) return text;
    }catch(e){
      lastError = e.message;
    }
  }

  throw new Error(lastError || "não foi possível carregar o CSV");
}

function splitCSVLine(line){
  const result = [];
  let current = "";
  let insideQuotes = false;

  for(let i=0;i<line.length;i++){
    const char = line[i];
    const next = line[i+1];

    if(char === '"' && insideQuotes && next === '"'){
      current += '"';
      i++;
    }else if(char === '"'){
      insideQuotes = !insideQuotes;
    }else if(char === "," && !insideQuotes){
      result.push(current);
      current = "";
    }else{
      current += char;
    }
  }

  result.push(current);
  return result;
}

function parseCSV(text){
  const lines = text.replace(/\r/g,"").split("\n").filter(l => l.trim());
  const headers = splitCSVLine(lines[0]).map(h => h.trim());

  return lines.slice(1).map(line => {
    const values = splitCSVLine(line);
    const obj = {};
    headers.forEach((h,i) => obj[h] = values[i] ?? "");
    return obj;
  });
}

function pick(headers,names){
  const mapped = headers.map(h => ({original:h, normalized:norm(h)}));

  for(const name of names){
    const found = mapped.find(h => h.normalized === norm(name));
    if(found) return found.original;
  }

  for(const name of names){
    const n = norm(name);
    const found = mapped.find(h => h.normalized.includes(n) || n.includes(h.normalized));
    if(found) return found.original;
  }

  return null;
}

function val(row,col){
  return col ? clean(row[col]) : "";
}

function num(v){
  let s = clean(v).replace(/[^0-9,.-]/g,"");
  if(s.includes(",") && s.includes(".")) s = s.replace(/\./g,"").replace(",",".");
  else s = s.replace(",",".");
  return parseFloat(s) || 0;
}

function idade(row){
  return num(val(row,COL.idade));
}

function isRio(cidade){
  const c = norm(cidade);
  return c === "RIO DE JANEIRO" || c === "RIO";
}

function cidadeVal(row){
  return val(row,COL.cidade) || "Não informado";
}

function bairroVal(row){
  return val(row,COL.bairro) || "Não informado";
}

function supVal(row){
  return val(row,COL.sup) || "Não informado";
}

function isAfastado(row){
  const s = norm([
    val(row,COL.situacao),
    val(row,COL.afastamento),
    val(row,COL.tipoAfastamento),
    val(row,COL.codfreq),
    val(row,COL.descricao)
  ].join(" "));

  if(!s) return false;

  return s.includes("AFAST") ||
         s.includes("LICEN") ||
         s.includes("CEDID") ||
         s.includes("SUSPENS") ||
         s.includes("INSS") ||
         s.includes("READAPT") ||
         s.includes("RESTRI");
}

function isOperacional(row){
  const s = norm([
    val(row,COL.funcaoCargo),
    val(row,COL.funcao),
    val(row,COL.tipoCargo),
    val(row,COL.tipoSetor),
    val(row,COL.descricao)
  ].join(" "));

  return s.includes("GARI") ||
         s.includes("MOTOR") ||
         s.includes("OPER") ||
         s.includes("COLETA") ||
         s.includes("LIMP") ||
         s.includes("FISCAL") ||
         s.includes("AGENTE");
}

function groupBy(arr,fn){
  return arr.reduce((acc,row)=>{
    const key = fn(row) || "Não informado";
    if(!acc[key]) acc[key] = [];
    acc[key].push(row);
    return acc;
  },{});
}

function topEntries(obj,limit=10){
  return Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,limit);
}

function fillSelect(id,values,label){
  const el = $(id);
  if(!el) return;

  const current = el.value;
  const unique = [...new Set(values.filter(Boolean))]
    .sort((a,b)=>a.localeCompare(b,"pt-BR"));

  el.innerHTML = `<option value="">${label}</option>` +
    unique.map(v => `<option value="${String(v).replaceAll('"',"&quot;")}">${v}</option>`).join("");

  if(unique.includes(current)) el.value = current;
}

function currentFilters(){
  return {
    dir: $("fDir")?.value || "",
    sup: $("fSupCoord")?.value || "",
    setor: $("fSetor")?.value || "",
    cidade: $("fCidade")?.value || "",
    bairro: $("fBairro")?.value || ""
  };
}

function rowPass(row,f,ignore=""){
  if(ignore !== "dir" && f.dir && val(row,COL.dir) !== f.dir) return false;
  if(ignore !== "sup" && f.sup && supVal(row) !== f.sup) return false;
  if(ignore !== "setor" && f.setor && val(row,COL.setor) !== f.setor) return false;
  if(ignore !== "cidade" && f.cidade && cidadeVal(row) !== f.cidade) return false;
  if(ignore !== "bairro" && f.bairro && bairroVal(row) !== f.bairro) return false;
  return true;
}

function filteredRows(){
  const f = currentFilters();
  return ROWS.filter(r => rowPass(r,f));
}

function updateFilters(changed=""){
  if(changed === "fDir"){
    if($("fSupCoord")) $("fSupCoord").value = "";
    if($("fSetor")) $("fSetor").value = "";
  }

  if(changed === "fSupCoord"){
    if($("fSetor")) $("fSetor").value = "";
  }

  const f = currentFilters();

  fillSelect("fDir", ROWS.filter(r=>rowPass(r,f,"dir")).map(r=>val(r,COL.dir)), "Todas");
  fillSelect("fSupCoord", ROWS.filter(r=>rowPass(r,f,"sup")).map(supVal), "Todas");
  fillSelect("fSetor", ROWS.filter(r=>rowPass(r,f,"setor")).map(r=>val(r,COL.setor)), "Todos");
  fillSelect("fCidade", ROWS.filter(r=>rowPass(r,f,"cidade")).map(cidadeVal), "Todas");
  fillSelect("fBairro", ROWS.filter(r=>rowPass(r,f,"bairro")).map(bairroVal), "Todos");
}

function renderBars(id,rows,total,cls=""){
  const el = $(id);
  if(!el) return;

  const max = rows[0]?.[1] || 1;

  el.innerHTML = rows.map(([k,v]) => `
    <div class="barRow">
      <span title="${k}">${k}</span>
      <div class="track"><div class="fill ${cls}" style="width:${v/max*100}%"></div></div>
      <b class="num">${fmtInt(v)}</b>
      <span class="pct">${fmtPct(total ? v/total*100 : 0)}</span>
    </div>
  `).join("") || `<div class="empty">Sem dados.</div>`;
}

function renderPerfil(data){
  const total = data.length;
  const afastados = data.filter(isAfastado).length;
  const ativos = total - afastados;
  const operacionais = data.filter(isOperacional).length;
  const administrativos = total - operacionais;

  const idades = data.map(idade).filter(n => n > 0);
  const risco65 = idades.filter(n => n >= 65).length;

  const pctAtivos = total ? ativos/total*100 : 0;
  const pctAfast = total ? afastados/total*100 : 0;
  const pctOper = total ? operacionais/total*100 : 0;
  const pctRisco = idades.length ? risco65/idades.length*100 : 0;

  if($("kTotal")) $("kTotal").textContent = fmtInt(total);
  if($("kAtivos")) $("kAtivos").textContent = fmtInt(ativos);
  if($("kAfast")) $("kAfast").textContent = fmtInt(afastados);
  if($("kRisco")) $("kRisco").textContent = idades.length ? fmtPct(pctRisco) : "N/D";
  if($("kLaudos")) $("kLaudos").textContent = "—";

  if($("nAtivos")) $("nAtivos").textContent = fmtPct(pctAtivos) + " disponíveis";
  if($("nAfast")) $("nAfast").textContent = fmtPct(pctAfast) + " do total";
  if($("nRisco")) $("nRisco").textContent = idades.length ? fmtInt(risco65) + " empregados com 65 anos ou mais" : "idade não localizada";

  if($("opQtd")) $("opQtd").textContent = fmtInt(operacionais);
  if($("admQtd")) $("admQtd").textContent = fmtInt(administrativos);
  if($("donutPct")) $("donutPct").textContent = fmtPct(pctOper);
  if($("donut")) $("donut").style.setProperty("--opPct", pctOper + "%");
  if($("compHint")) $("compHint").textContent = pctOper >= 60 ? "Predominância operacional coerente com a atividade-fim." : "Maior peso relativo administrativo no recorte.";

  const dirRows = Object.entries(groupBy(data,r=>val(r,COL.dir)))
    .map(([k,v])=>[k,v.length])
    .sort((a,b)=>b[1]-a[1])
    .slice(0,6);

  renderBars("dirBars",dirRows,total);

  const activityRows = Object.entries(groupBy(data,r=>val(r,COL.dir)))
    .map(([k,v])=>{
      const af = v.filter(isAfastado).length;
      const at = v.length - af;
      return [k,v.length ? at/v.length*100 : 0];
    })
    .sort((a,b)=>b[1]-a[1])
    .slice(0,6);

  const activity = $("activityCols");
  if(activity){
    activity.innerHTML = activityRows.map(([k,p])=>`
      <div class="colWrap">
        <div class="colVal ${p<80 ? "warn" : ""}">${fmtPct(p)}</div>
        <div class="col" style="--h:${Math.max(20,p)}%"></div>
        <div class="colLbl" title="${k}">${k}</div>
      </div>
    `).join("") || `<div class="empty">Sem dados.</div>`;
  }

  const alerts = $("alerts");
  if(alerts){
    alerts.innerHTML = `
      <div class="alert ${pctAfast>=20?"red":pctAfast>=10?"orange":"green"}">
        <small>Pressão operacional</small>
        <b>${fmtPct(pctAfast)}</b>
        <span>afastamento geral no filtro atual</span>
      </div>
      <div class="alert ${pctRisco>=15?"red":pctRisco>=8?"orange":"green"}">
        <small>Risco de reposição</small>
        <b>${idades.length ? fmtPct(pctRisco) : "N/D"}</b>
        <span>quadro com 65 anos ou mais</span>
      </div>
      <div class="alert green">
        <small>Estrutura funcional</small>
        <b>${fmtPct(pctOper)}</b>
        <span>concentração operacional</span>
      </div>
      <div class="alert">
        <small>Laudos / Restrições</small>
        <b>—</b>
        <span>em implantação</span>
      </div>
      <div class="alert">
        <small>Base filtrada</small>
        <b>${fmtInt(total)}</b>
        <span>empregados no recorte selecionado</span>
      </div>
    `;
  }

  const ranking = $("ranking");
  if(ranking){
    const rows = Object.entries(groupBy(data,r=>val(r,COL.dir)))
      .map(([k,v])=>{
        const af = v.filter(isAfastado).length;
        const at = v.length - af;
        const pct = v.length ? at/v.length*100 : 0;
        return {k,total:v.length,ativos:at,afastados:af,pct};
      })
      .filter(x=>x.total>=5)
      .sort((a,b)=>a.pct-b.pct)
      .slice(0,5);

    ranking.innerHTML = rows.map(r=>`
      <div class="rank">
        <div>
          <b>${r.k}</b>
          <small>${fmtInt(r.ativos)} ativos · ${fmtInt(r.afastados)} afastados · ${fmtPct(r.pct)} atividade</small>
        </div>
        <span class="statusPill ${r.pct<75?"crit":r.pct<85?"att":"ok"}">${r.pct<75?"Crítico":r.pct<85?"Atenção":"Monitorar"}</span>
      </div>
    `).join("") || `<div class="empty">Sem ranking disponível.</div>`;
  }
}

function renderTerritorial(data){
  const geo = data.filter(r => cidadeVal(r) !== "Não informado");
  const total = geo.length;
  const fora = geo.filter(r => !isRio(cidadeVal(r))).length;
  const dentro = total - fora;

  const pctFora = total ? fora/total*100 : 0;
  const pctDentro = total ? dentro/total*100 : 0;

  const cidadeCount = {};
  const bairroCount = {};
  const bairroRJCount = {};

  geo.forEach(r=>{
    const c = cidadeVal(r);
    const b = bairroVal(r);
    cidadeCount[c] = (cidadeCount[c] || 0) + 1;
    bairroCount[b] = (bairroCount[b] || 0) + 1;
    if(isRio(c)) bairroRJCount[b] = (bairroRJCount[b] || 0) + 1;
  });

  const topCidadeExt = topEntries(Object.fromEntries(Object.entries(cidadeCount).filter(([c])=>!isRio(c))),1)[0];
  const topBairroRJ = topEntries(bairroRJCount,1)[0] || topEntries(bairroCount,1)[0];

  if($("tForaRioHero")) $("tForaRioHero").textContent = fmtPct(pctFora);
  if($("tEfetivoGeo")) $("tEfetivoGeo").textContent = fmtInt(total);
  if($("tDentroRio")) $("tDentroRio").textContent = fmtPct(pctDentro);
  if($("tTopCidade")) $("tTopCidade").textContent = topCidadeExt ? topCidadeExt[0] : "—";
  if($("tTopBairro")) $("tTopBairro").textContent = topBairroRJ ? topBairroRJ[0] : "—";
  if($("tInsight")) $("tInsight").textContent = `${fmtPct(pctFora)} dos empregados com cidade informada residem fora do município do Rio.`;

  const tTopList = $("tTopList");
  if(tTopList){
    const cidades = topEntries(cidadeCount,5);
    const bairros = topEntries(bairroCount,5);

    tTopList.innerHTML =
      cidades.map(([k,v])=>`
        <div class="miniItem">
          <div><b>${k}</b><small>Município de moradia</small></div>
          <b>${fmtInt(v)}</b>
        </div>
      `).join("") +
      bairros.map(([k,v])=>`
        <div class="miniItem">
          <div><b>${k}</b><small>Bairro de moradia</small></div>
          <b>${fmtInt(v)}</b>
        </div>
      `).join("");
  }

  renderBars("tCidadeBars",topEntries(cidadeCount,12),total,"green");
  renderBars("tBairroBars",topEntries(bairroCount,12),total,"green");

  const tRankingSetor = $("tRankingSetor");
  if(tRankingSetor){
    const rows = Object.entries(groupBy(geo,r=>val(r,COL.setor)))
      .map(([k,v])=>{
        const fora = v.filter(r=>!isRio(cidadeVal(r))).length;
        const pct = v.length ? fora/v.length*100 : 0;
        return {k,total:v.length,fora,pct};
      })
      .filter(x=>x.total>=5)
      .sort((a,b)=>b.pct-a.pct)
      .slice(0,10);

    tRankingSetor.innerHTML = rows.map(r=>`
      <div class="rank">
        <div>
          <b>${r.k}</b>
          <small>${fmtInt(r.fora)} de ${fmtInt(r.total)} empregados residem fora do Rio</small>
        </div>
        <span class="statusPill ${r.pct>=40?"crit":r.pct>=20?"att":"ok"}">${fmtPct(r.pct)}</span>
      </div>
    `).join("") || `<div class="empty">Sem ranking territorial disponível.</div>`;
  }

  const tExecutiveRead = $("tExecutiveRead");
  if(tExecutiveRead){
    tExecutiveRead.innerHTML = `
      <div class="alert ${pctFora>=30?"orange":"green"}">
        <small>Moradia fora do Rio</small>
        <b>${fmtPct(pctFora)}</b>
        <span>impacto potencial em deslocamento</span>
      </div>
      <div class="alert">
        <small>Maior concentração</small>
        <b>${topEntries(cidadeCount,1)[0]?.[0] || "—"}</b>
        <span>município com maior volume</span>
      </div>
      <div class="alert">
        <small>Bairro destaque</small>
        <b>${topBairroRJ ? topBairroRJ[0] : "—"}</b>
        <span>bairro mais frequente</span>
      </div>
      <div class="alert green">
        <small>Uso gerencial</small>
        <b>Realocação</b>
        <span>apoio à análise casa x setor</span>
      </div>
    `;
  }

  const tTable = $("tTable");
  if(tTable){
    tTable.innerHTML = geo.slice(0,500).map(r=>{
      const cidade = cidadeVal(r);
      const risco = isRio(cidade) ? "Baixo" : "Atenção";
      return `
        <tr>
          <td>${val(r,COL.dir)}</td>
          <td>${supVal(r)}</td>
          <td>${val(r,COL.setor)}</td>
          <td>${cidade}</td>
          <td>${bairroVal(r)}</td>
          <td>${isAfastado(r) ? "Afastado" : "Ativo"}</td>
          <td><span class="tag ${risco==="Atenção"?"att":"ok"}">${risco}</span></td>
        </tr>
      `;
    }).join("");
  }
}

function renderAbsenteismoFake(){
  if($("aInsight")) $("aInsight").textContent = "Módulo de absenteísmo reservado para conexão com a base específica.";
  if($("aTotal")) $("aTotal").textContent = "—";
  if($("aHoras")) $("aHoras").textContent = "—";
  if($("aGer")) $("aGer").textContent = "—";
  if($("aNaoGer")) $("aNaoGer").textContent = "—";
  if($("aRanking")) $("aRanking").innerHTML = `<div class="empty">Base de absenteísmo não conectada neste script.</div>`;
  if($("aAlerts")) $("aAlerts").innerHTML = `
    <div class="alert"><small>Status</small><b>Reservado</b><span>aguardando base de absenteísmo</span></div>
  `;
}

function render(){
  const data = filteredRows();

  renderPerfil(data);
  renderTerritorial(data);
  renderAbsenteismoFake();

  if($("updated")){
    $("updated").textContent = "Atualizado em: " + new Date().toLocaleString("pt-BR") + " · Fonte: Planilha oficial publicada";
  }
}

async function loadData(){
  try{
    hideError();

    const text = await fetchCsvText(CSV_URL);
    const rows = parseCSV(text).filter(row => Object.values(row).some(v => clean(v)));

    if(!rows.length) throw new Error("CSV carregou, mas veio sem linhas.");

    ROWS = rows;

    const headers = Object.keys(ROWS[0]);

    COL = {
      dir: pick(headers,["DIRETORIA","DIR"]),
      sup: pick(headers,["SUPERINTENDÊNCIA","SUPERINTENDENCIA","COORDENAÇÃO","COORDENACAO","COORD"]),
      setor: pick(headers,["SETOR","LOTAÇÃO","LOTACAO"]),
      registro: pick(headers,["REGISTRO","MATRÍCULA","MATRICULA"]),
      nome: pick(headers,["NOME","NOME DO SERVIDOR","SERVIDOR"]),
      funcaoCargo: pick(headers,["FUNCAOCARGO","FUNÇÃO CARGO","FUNCAO CARGO","CARGO"]),
      funcao: pick(headers,["FUNCAO","FUNÇÃO","FUNÇÃO EXERCIDA","FUNCAO EXERCIDA","EC"]),
      codfreq: pick(headers,["CODFREQ"]),
      afastamento: pick(headers,["AFASTAMENTO"]),
      tipoAfastamento: pick(headers,["TIPOAFASTAMENTO","TIPO AFASTAMENTO"]),
      descricao: pick(headers,["DESCRIÇÃO","DESCRICAO"]),
      tipoCargo: pick(headers,["TIPOCARGO","TIPO CARGO"]),
      tipoSetor: pick(headers,["TIPOSETOR","TIPO SETOR"]),
      bairro: pick(headers,["BAIRROENDER","BAIRRO","BAIRRO_RES","BAIRRO RES"]),
      cidade: pick(headers,["CIDADEENDER","CIDADE","MUNICIPIO","MUNICÍPIO","MUNICIPIO_RES"]),
      idade: pick(headers,["IDADE","IDADEANOS","IDADE ANOS"]),
      situacao: pick(headers,["SITUAÇÃO FUNCIONAL","SITUACAO FUNCIONAL","SITUAÇÃO","SITUACAO"])
    };

    if(!COL.dir) throw new Error("Coluna DIRETORIA não localizada.");
    if(!COL.setor) throw new Error("Coluna SETOR não localizada.");
    if(!COL.idade) showError("Atenção: coluna de idade não localizada. O risco 65+ ficará N/D.");

    updateFilters();
    render();

  }catch(err){
    console.error(err);
    showError("Não foi possível carregar os dados via CSV publicado. Erro: " + err.message);
    if($("updated")) $("updated").textContent = "Atualizado em: erro no carregamento";
  }
}

["fDir","fSupCoord","fSetor","fCidade","fBairro"].forEach(id=>{
  document.addEventListener("change",e=>{
    if(e.target && e.target.id === id){
      updateFilters(id);
      render();
    }
  });
});

document.querySelectorAll(".tabBtn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".tabBtn").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));

    btn.classList.add("active");

    const targetId = btn.dataset.tab || btn.dataset.screen;
    const target = $(targetId);

    if(target) target.classList.add("active");
  });
});

document.addEventListener("DOMContentLoaded",loadData);
</script>
